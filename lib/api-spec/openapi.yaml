openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Architecture Student Association FBC API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: events
    description: Events management
  - name: news
    description: News and blog posts
  - name: team
    description: Team members
  - name: gallery
    description: Gallery images
  - name: resources
    description: Resources and toolkit
  - name: contact
    description: Contact form
  - name: jobs
    description: Job listings
  - name: admin
    description: Admin operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List all events
      parameters:
        - name: upcoming
          in: query
          schema:
            type: boolean
        - name: limit
          in: query
          schema:
            type: number
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"
    post:
      operationId: createEvent
      tags: [events]
      summary: Create a new event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEventRequest"
      responses:
        "201":
          description: Created event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"

  /events/{id}:
    get:
      operationId: getEvent
      tags: [events]
      summary: Get event by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: number
      responses:
        "200":
          description: Event details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
    patch:
      operationId: updateEvent
      tags: [events]
      summary: Update an event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEventRequest"
      responses:
        "200":
          description: Updated event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
    delete:
      operationId: deleteEvent
      tags: [events]
      summary: Delete an event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: number
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /news:
    get:
      operationId: listNews
      tags: [news]
      summary: List news/blog posts
      parameters:
        - name: limit
          in: query
          schema:
            type: number
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of news posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NewsPost"
    post:
      operationId: createNewsPost
      tags: [news]
      summary: Create a news post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNewsPostRequest"
      responses:
        "201":
          description: Created post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsPost"

  /news/{id}:
    get:
      operationId: getNewsPost
      tags: [news]
      summary: Get news post by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: number
      responses:
        "200":
          description: News post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsPost"
    patch:
      operationId: updateNewsPost
      tags: [news]
      summary: Update a news post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNewsPostRequest"
      responses:
        "200":
          description: Updated post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsPost"
    delete:
      operationId: deleteNewsPost
      tags: [news]
      summary: Delete a news post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: number
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /team:
    get:
      operationId: listTeamMembers
      tags: [team]
      summary: List team members
      responses:
        "200":
          description: List of team members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamMember"
    post:
      operationId: createTeamMember
      tags: [team]
      summary: Create a team member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTeamMemberRequest"
      responses:
        "201":
          description: Created team member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMember"

  /team/{id}:
    patch:
      operationId: updateTeamMember
      tags: [team]
      summary: Update a team member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTeamMemberRequest"
      responses:
        "200":
          description: Updated team member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMember"
    delete:
      operationId: deleteTeamMember
      tags: [team]
      summary: Delete a team member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: number
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /gallery:
    get:
      operationId: listGalleryImages
      tags: [gallery]
      summary: List gallery images
      parameters:
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of gallery images
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GalleryImage"
    post:
      operationId: createGalleryImage
      tags: [gallery]
      summary: Add a gallery image
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGalleryImageRequest"
      responses:
        "201":
          description: Created gallery image
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GalleryImage"

  /gallery/{id}:
    patch:
      operationId: updateGalleryImage
      tags: [gallery]
      summary: Update a gallery image
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGalleryImageRequest"
      responses:
        "200":
          description: Updated gallery image
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GalleryImage"
    delete:
      operationId: deleteGalleryImage
      tags: [gallery]
      summary: Delete a gallery image
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: number
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /resources:
    get:
      operationId: listResources
      tags: [resources]
      summary: List resources
      parameters:
        - name: type
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of resources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Resource"
    post:
      operationId: createResource
      tags: [resources]
      summary: Create a resource
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateResourceRequest"
      responses:
        "201":
          description: Created resource
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resource"

  /resources/{id}:
    patch:
      operationId: updateResource
      tags: [resources]
      summary: Update a resource
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateResourceRequest"
      responses:
        "200":
          description: Updated resource
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resource"
    delete:
      operationId: deleteResource
      tags: [resources]
      summary: Delete a resource
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: number
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List job listings
      parameters:
        - name: type
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of job listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Job"
    post:
      operationId: createJob
      tags: [jobs]
      summary: Create a job listing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobRequest"
      responses:
        "201":
          description: Created job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"

  /jobs/{id}:
    patch:
      operationId: updateJob
      tags: [jobs]
      summary: Update a job listing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobRequest"
      responses:
        "200":
          description: Updated job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
    delete:
      operationId: deleteJob
      tags: [jobs]
      summary: Delete a job listing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: number
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /contact:
    post:
      operationId: submitContact
      tags: [contact]
      summary: Submit contact form
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactFormRequest"
      responses:
        "200":
          description: Contact form submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/contacts:
    get:
      operationId: listContactSubmissions
      tags: [admin]
      summary: List contact form submissions
      responses:
        "200":
          description: List of contact submissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContactSubmission"

  /newsletter:
    post:
      operationId: subscribeNewsletter
      tags: [contact]
      summary: Subscribe to newsletter
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewsletterRequest"
      responses:
        "200":
          description: Subscribed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'

  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed.
          content:
            '*/*':
              schema:
                type: string
                format: binary

  /auth/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: JWT token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"

  /auth/me:
    get:
      operationId: getAdminMe
      tags: [admin]
      summary: Get current admin user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get admin dashboard stats
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Event:
      type: object
      properties:
        id:
          type: number
        title:
          type: string
        description:
          type: string
        date:
          type: string
        time:
          type: string
        location:
          type: string
        type:
          type: string
          enum: [workshop, lecture, social, critique, competition, other]
        imageUrl:
          type: string
        isUpcoming:
          type: boolean
        rsvpCount:
          type: number
        createdAt:
          type: string
      required:
        - id
        - title
        - description
        - date
        - time
        - location
        - type
        - isUpcoming
        - rsvpCount
        - createdAt

    CreateEventRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        date:
          type: string
        time:
          type: string
        location:
          type: string
        type:
          type: string
        imageUrl:
          type: string
        isUpcoming:
          type: boolean
        rsvpCount:
          type: number
      required:
        - title
        - description
        - date
        - time
        - location
        - type

    NewsPost:
      type: object
      properties:
        id:
          type: number
        title:
          type: string
        excerpt:
          type: string
        content:
          type: string
        category:
          type: string
          enum: [reviews, opinion, alumni-spotlight, tech-tips, news]
        author:
          type: string
        authorRole:
          type: string
        imageUrl:
          type: string
        publishedAt:
          type: string
        readTime:
          type: number
      required:
        - id
        - title
        - excerpt
        - content
        - category
        - author
        - authorRole
        - publishedAt
        - readTime

    CreateNewsPostRequest:
      type: object
      properties:
        title:
          type: string
        excerpt:
          type: string
        content:
          type: string
        category:
          type: string
        author:
          type: string
        authorRole:
          type: string
        imageUrl:
          type: string
        readTime:
          type: number
      required:
        - title
        - excerpt
        - content
        - category
        - author
        - authorRole

    TeamMember:
      type: object
      properties:
        id:
          type: number
        name:
          type: string
        position:
          type: string
        year:
          type: string
        bio:
          type: string
        interests:
          type: string
        imageUrl:
          type: string
        email:
          type: string
        instagram:
          type: string
        linkedin:
          type: string
        order:
          type: number
      required:
        - id
        - name
        - position
        - year
        - bio
        - interests
        - order

    CreateTeamMemberRequest:
      type: object
      properties:
        name:
          type: string
        position:
          type: string
        year:
          type: string
        bio:
          type: string
        interests:
          type: string
        imageUrl:
          type: string
        email:
          type: string
        instagram:
          type: string
        linkedin:
          type: string
        order:
          type: number
      required:
        - name
        - position
        - year
        - bio
        - interests

    GalleryImage:
      type: object
      properties:
        id:
          type: number
        title:
          type: string
        description:
          type: string
        imageUrl:
          type: string
        category:
          type: string
          enum: [studio-1st, studio-2nd, studio-3rd, thesis, models, drawings, competitions]
        author:
          type: string
        year:
          type: string
        createdAt:
          type: string
      required:
        - id
        - title
        - imageUrl
        - category
        - author
        - year
        - createdAt

    CreateGalleryImageRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        imageUrl:
          type: string
        category:
          type: string
        author:
          type: string
        year:
          type: string
      required:
        - title
        - imageUrl
        - category
        - author
        - year

    Resource:
      type: object
      properties:
        id:
          type: number
        title:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [guide, template, tutorial, software, equipment]
        fileUrl:
          type: string
        software:
          type: string
        createdAt:
          type: string
      required:
        - id
        - title
        - description
        - type
        - createdAt

    CreateResourceRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        type:
          type: string
        fileUrl:
          type: string
        software:
          type: string
      required:
        - title
        - description
        - type

    Job:
      type: object
      properties:
        id:
          type: number
        title:
          type: string
        company:
          type: string
        location:
          type: string
        type:
          type: string
          enum: [internship, part-time, full-time, volunteer]
        description:
          type: string
        requirements:
          type: string
        applicationUrl:
          type: string
        deadline:
          type: string
        createdAt:
          type: string
      required:
        - id
        - title
        - company
        - location
        - type
        - description
        - createdAt

    CreateJobRequest:
      type: object
      properties:
        title:
          type: string
        company:
          type: string
        location:
          type: string
        type:
          type: string
        description:
          type: string
        requirements:
          type: string
        applicationUrl:
          type: string
        deadline:
          type: string
      required:
        - title
        - company
        - location
        - type
        - description

    ContactFormRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        subject:
          type: string
        message:
          type: string
      required:
        - name
        - email
        - subject
        - message

    ContactSubmission:
      type: object
      properties:
        id:
          type: number
        name:
          type: string
        email:
          type: string
        subject:
          type: string
        message:
          type: string
        createdAt:
          type: string
      required:
        - id
        - name
        - email
        - subject
        - message
        - createdAt

    NewsletterRequest:
      type: object
      properties:
        email:
          type: string
        name:
          type: string
      required:
        - email

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success
        - message

    AdminStats:
      type: object
      properties:
        totalEvents:
          type: number
        totalNews:
          type: number
        totalGallery:
          type: number
        totalTeamMembers:
          type: number
        totalResources:
          type: number
        totalJobs:
          type: number
        totalContacts:
          type: number
        upcomingEvents:
          type: number
      required:
        - totalEvents
        - totalNews
        - totalGallery
        - totalTeamMembers
        - totalResources
        - totalJobs
        - totalContacts
        - upcomingEvents

    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required:
        - username
        - password

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        username:
          type: string
      required:
        - token
        - username

    AdminUser:
      type: object
      properties:
        username:
          type: string
        role:
          type: string
      required:
        - username
        - role

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
        size:
          type: integer
        contentType:
          type: string

    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
        objectPath:
          type: string
        metadata:
          $ref: '#/components/schemas/UploadUrlRequest'
