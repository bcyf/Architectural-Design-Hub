kind = "web"
previewPath = "/"
title = "ARC Student Association"
version = "1.0.0"
id = "artifacts/arc-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22227
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/arc-website run dev"

[services.env]
PORT = "22227"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/arc-website", "run", "build"]
publicDir = "artifacts/arc-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
